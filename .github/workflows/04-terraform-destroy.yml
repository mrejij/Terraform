# =============================================================================
# TERRAFORM DESTROY
# Tears down all infrastructure. Manual trigger ONLY with confirmation.
# Use with extreme caution.
#
# Trigger: Manual (workflow_dispatch) with confirmation input
# =============================================================================

name: "04 - Terraform Destroy"

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment to destroy"
        required: true
        default: "prod"
        type: choice
        options:
          - prod
      confirm:
        description: "Type DESTROY to confirm"
        required: true
        type: string

permissions:
  contents: read

env:
  ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
  ARM_TENANT_ID:       ${{ secrets.ARM_TENANT_ID }}
  TF_VERSION:          "1.7.5"
  TG_VERSION:          "0.55.21"

jobs:
  validate-input:
    name: Validate Confirmation
    runs-on: ubuntu-latest
    steps:
      - name: Check confirmation
        if: github.event.inputs.confirm != 'DESTROY'
        run: |
          echo "❌ Confirmation failed. You must type 'DESTROY' to proceed."
          exit 1

  destroy:
    name: Terragrunt Destroy
    runs-on: ubuntu-latest
    needs: validate-input
    environment: ${{ github.event.inputs.environment }}
    defaults:
      run:
        working-directory: environments/${{ github.event.inputs.environment }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Setup Terragrunt
        run: |
          curl -fsSL -o terragrunt "https://github.com/gruntwork-io/terragrunt/releases/download/v${TG_VERSION}/terragrunt_linux_amd64"
          chmod +x terragrunt
          sudo mv terragrunt /usr/local/bin/
          terragrunt --version
        working-directory: ${{ github.workspace }}

      - name: Azure Login
        run: |
          az login -u "${{ secrets.AZURE_USERNAME }}" -p "${{ secrets.AZURE_PASSWORD }}" --tenant "${{ secrets.ARM_TENANT_ID }}"
          az account set --subscription "${{ secrets.ARM_SUBSCRIPTION_ID }}"

      - name: Terragrunt Init
        run: terragrunt run-all init --terragrunt-non-interactive

      - name: Terragrunt Destroy
        run: terragrunt run-all destroy --terragrunt-non-interactive -auto-approve
