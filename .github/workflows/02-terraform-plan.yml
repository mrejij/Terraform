# =============================================================================
# TERRAFORM PLAN ON PULL REQUESTS
# Runs terragrunt plan on every PR targeting main. Posts the plan output
# as a PR comment for review.
#
# Trigger: Pull request to main branch
# =============================================================================

name: "02 - Terraform Plan"

on:
  pull_request:
    branches: [master]
    paths:
      - "modules/**"
      - "environments/**"
      - "terragrunt.hcl"

permissions:
  contents: read
  pull-requests: write

env:
  ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
  ARM_TENANT_ID:       ${{ secrets.ARM_TENANT_ID }}
  TF_VERSION:          "1.7.5"
  TG_VERSION:          "0.55.21"
  ENVIRONMENT:         "prod"

jobs:
  plan:
    name: Terragrunt Plan
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: environments/${{ env.ENVIRONMENT }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Setup Terragrunt
        run: |
          curl -fsSL -o terragrunt "https://github.com/gruntwork-io/terragrunt/releases/download/v${TG_VERSION}/terragrunt_linux_amd64"
          chmod +x terragrunt
          sudo mv terragrunt /usr/local/bin/
          terragrunt --version
        working-directory: ${{ github.workspace }}

      - name: Azure Login
        run: |
          az login -u "${{ secrets.AZURE_USERNAME }}" -p "${{ secrets.AZURE_PASSWORD }}" --tenant "${{ secrets.ARM_TENANT_ID }}"
          az account set --subscription "${{ secrets.ARM_SUBSCRIPTION_ID }}"

      - name: Terragrunt Init
        run: terragrunt run-all init --terragrunt-non-interactive

      - name: Terragrunt Validate
        run: terragrunt run-all validate --terragrunt-non-interactive

      - name: Terragrunt Plan
        id: plan
        run: |
          set +e
          terragrunt run-all plan --terragrunt-non-interactive -no-color 2>&1 | tee plan_output.txt
          PLAN_EXIT_CODE=${PIPESTATUS[0]}
          set -e

          # Truncate very long plans to fit within GitHub comment limits (65536 chars)
          if [ $(wc -c < plan_output.txt) -gt 60000 ]; then
            echo "Plan output is very large. Truncating for PR comment..."
            head -c 55000 plan_output.txt > plan_truncated.txt
            echo -e "\n\n... (truncated — see workflow logs for full output)" >> plan_truncated.txt
            mv plan_truncated.txt plan_output.txt
          fi

          echo "exit_code=${PLAN_EXIT_CODE}" >> "$GITHUB_OUTPUT"
          exit ${PLAN_EXIT_CODE}

      - name: Post Plan to PR
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const planPath = `${process.env.GITHUB_WORKSPACE}/environments/${process.env.ENVIRONMENT}/plan_output.txt`;
            let planOutput = 'No plan output found.';
            if (fs.existsSync(planPath)) {
              planOutput = fs.readFileSync(planPath, 'utf8');
            }
            const exitCode = '${{ steps.plan.outputs.exit_code }}';
            const icon = exitCode === '0' ? '✅' : '❌';

            const body = `### ${icon} Terragrunt Plan — \`${process.env.ENVIRONMENT}\`

            <details>
            <summary>Click to expand plan output</summary>

            \`\`\`
            ${planOutput}
            \`\`\`

            </details>

            **Exit Code:** \`${exitCode}\`
            **Triggered by:** @${context.actor}
            **Commit:** \`${context.sha.substring(0, 8)}\``;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('Terragrunt Plan')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body,
              });
            }
